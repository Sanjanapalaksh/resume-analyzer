<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- App Name for Browser Tab -->
    <title>SkillMatch AI – Resume Analyzer</title>

    <!-- SEO Description for Google -->
    <meta name="description" content="SkillMatch AI is a free resume analyzer that matches your resume with job descriptions using AI-powered scoring. Upload your resume and see your job fit instantly.">

    <!-- Bootstrap CSS for modern UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional: Custom styling -->
    <style>
        body {
            background-color: #f8f9fa; /* Light gray background */
        }
        h1 {
            color: #0d6efd; /* Bootstrap primary blue */
        }
        .container {
            max-width: 600px;
        }
    </style>
</head>
<body>
  <div class="container py-5">
    <!-- App Heading -->
    <h1 class="text-center mb-4">SkillMatch AI – Resume Analyzer</h1>

    <!-- Resume Upload Form -->
    <form method="POST" enctype="multipart/form-data" class="bg-white p-4 rounded shadow">
      <div class="mb-3">
        <label for="resume" class="form-label">Upload your Resume (PDF)</label>
        <input class="form-control" type="file" id="resume" name="resume" required>
      </div>
      <div class="mb-3">
        <label for="job_description" class="form-label">Paste Job Description</label>
        <textarea class="form-control" id="job_description" name="job_description" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Check Match</button>
    </form>

    <!-- Display Similarity Score with Colors -->
    {% if score %}
      {% if score >= 80 %}
        <div class="alert alert-success mt-4 text-center">
          Resume matches the job description by <strong>{{ score }}%</strong>
        </div>
      {% elif score >= 50 %}
        <div class="alert alert-warning mt-4 text-center">
          Resume matches the job description by <strong>{{ score }}%</strong>
        </div>
      {% else %}
        <div class="alert alert-danger mt-4 text-center">
          Resume matches the job description by <strong>{{ score }}%</strong>
        </div>
      {% endif %}
    {% endif %}
  </div>
</body>
</html>
